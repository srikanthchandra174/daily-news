name: Fetch news

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch feeds
        run: node scripts/fetch-news.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --quiet --cached; then
            echo "No changes."
          else
            git commit -m "Update news.json ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
